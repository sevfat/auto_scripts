name: 🔄 Eternodes Auto Renew

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发
  schedule:
    # UTC 20:18 (北京时间 04:18)，每 3 天执行一次
    - cron: "18 20 */3 * *"

# 权限配置：允许提交和推送更改
permissions:
  contents: write
concurrency:
  group: eternodes-renew
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PROJECT_DIR: eternodes
      SCRIPT_NAME: eternodes_renew.sh
      SCRIPT_DESC: Eternodes 续期脚本
      # ETERNODE_BATCH_ACCOUNTS 格式说明:
      # 每行一个账号，格式为: token|accountName,session_id,user_id,server_value[,tg_token,tg_chat_id]
      # 其中 token|accountName 中的 accountName 是可选的
      # 示例:
      #   token1|account1,session_id_1,user_id_1,server_value_1,tg_token_1,tg_chat_id_1
      #   token2|account2,session_id_2,user_id_2,server_value_2
      #   token3,session_id_3,user_id_3,server_value_3,tg_token_3,tg_chat_id_3
      ETERNODE_BATCH_ACCOUNTS: ${{ secrets.ETERNODE_BATCH_ACCOUNTS }}
      HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
      SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
      PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
    
    steps:
      # 步骤 1: 检出公开仓库
      - name: 📥 检出公开仓库
        uses: actions/checkout@v4

      # 步骤 2: 检出私有仓库
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto_eternodes_private
          token: ${{ env.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      # 步骤 3: 安装系统依赖
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd curl

      # 步骤 4: 安装 Hysteria2（如果需要代理）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ env.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      # 步骤 5: 添加随机延迟
      - name: ⏳ 添加随机延迟
        run: |
          delay=$((RANDOM % 60))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      # 步骤 6: 执行脚本
      - name: 🚀 执行 ${{ env.SCRIPT_DESC }}
        run: bash ${{ env.SCRIPT_NAME }}
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}

      # 步骤 7: 提交执行时间到公开库
      - name: ⏱️ 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ${{ env.PROJECT_DIR }} && echo "$(date +'%Y-%m-%d %H:%M:%S')" > ${{ env.PROJECT_DIR }}/time.txt
          git add ${{ env.PROJECT_DIR }}/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
