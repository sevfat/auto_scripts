name: 🔄 WeirdHost Auto Renew-已失效，不修了

on:
  schedule:
    # 每天 UTC 时间 3:01（北京时间 11:01）
    - cron: '1 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      # ===============================
      # 1️⃣ checkout 当前仓库（用于 time.txt）
      # ===============================
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: current

      # ===============================
      # 2️⃣ checkout 私库 
      # ===============================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: jyucoeng/auto-weirdhost-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: scripts
        run: pip install -r requirements.txt -q > /dev/null 2>&1

      # 步骤 5.5: 安装 Hysteria2（如果需要代理）
      - name: 📡 安装 Hysteria2
        run: |
          if [ -n "${{ secrets.HY2_PROXY_URL }}" ]; then
            echo "安装 Hysteria2..."
            curl -L -o hysteria \
              https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64
            chmod +x hysteria
            sudo mv hysteria /usr/local/bin/hysteria
            hysteria version
            echo "✅ Hysteria2 安装完成"
          else
            echo "⚠️ 未配置代理，跳过 Hysteria2 安装"
          fi

      - name: Run renew script
        working-directory: scripts
        env:
          HEADLESS: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.WEIRDHOST_TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.WEIRDHOST_TG_CHAT_ID }}
          REMEMBER_WEB_COOKIE: ${{ secrets.WEIRDHOST_REMEMBER_WEB_COOKIE }}
          HY2_PROXY_URL: ${{ secrets.HY2_PROXY_URL }}
          SOCKS_PORT: ${{ secrets.SOCKS_PORT || '51080' }}
        run: python kr-renew.py

      # ===============================
      # 3️⃣ 提交 time.txt 到「当前仓库」weirdhost 文件夹
      # ===============================
      - name: Commit time.txt to current repo
        if: success()
        working-directory: current
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p weirdhost

          if [ ! -f weirdhost/time.txt ]; then
            echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > weirdhost/time.txt
          else
            echo "$(date +'%Y-%m-%d %H:%M:%S')" > weirdhost/time.txt
          fi

          git add weirdhost/time.txt

          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "⏱️ 更新 weirdhost 时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:main
          fi

      # ===============================
      # 4️⃣ artifacts
      # ===============================
      - name: Upload response JSON files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: response-json
          path: scripts/response_*.json
          retention-days: 7
